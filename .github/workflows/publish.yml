name: Publish

# Compiles the corpus into per-technology JSON (en/<slug>.json, de/<slug>.json,
# index.json) and syncs it to the public Hetzner Object Storage bucket the
# guard.ch /replay page fetches from. Runs after the Validate workflow's checks
# pass on a push to main.
#
# Required repo secrets:
#   GUARD_TECH_S3_ACCESS_KEY   - Hetzner Object Storage access key
#   GUARD_TECH_S3_SECRET_KEY   - Hetzner Object Storage secret key
# Optional repo variables (sensible defaults below):
#   GUARD_TECH_S3_ENDPOINT     - default https://hel1.your-objectstorage.com
#   GUARD_TECH_S3_BUCKET       - default guard-technologies
#   GUARD_TECH_S3_REGION       - default hel1
#
# Public URL pattern (what the frontend builds from a technology name):
#   <endpoint>/<bucket>/<lang>/<techSlug(name)>.json

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "i18n/**"
      - "scripts/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false   # never interrupt a half-finished bucket sync

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Build and sync
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.GUARD_TECH_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.GUARD_TECH_S3_SECRET_KEY }}
      AWS_REGION: ${{ vars.GUARD_TECH_S3_REGION || 'hel1' }}
      S3_ENDPOINT: ${{ vars.GUARD_TECH_S3_ENDPOINT || 'https://hel1.your-objectstorage.com' }}
      S3_BUCKET: ${{ vars.GUARD_TECH_S3_BUCKET || 'guard-technologies' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build dist/
        run: node scripts/build.mjs

      - name: Apply bucket CORS (idempotent)
        continue-on-error: true
        run: |
          aws s3api put-bucket-cors \
            --endpoint-url "$S3_ENDPOINT" \
            --bucket "$S3_BUCKET" \
            --cors-configuration "file://scripts/bucket-cors.json"

      - name: Sync to bucket
        run: |
          aws s3 sync dist/ "s3://$S3_BUCKET/" \
            --endpoint-url "$S3_ENDPOINT" \
            --acl public-read \
            --content-type application/json \
            --cache-control "public, max-age=86400" \
            --delete \
            --no-progress

      - name: Summary
        run: |
          {
            echo "### guard-technologies published"
            echo ""
            echo "- bucket: \`$S3_BUCKET\` @ \`$S3_ENDPOINT\`"
            echo "- technologies: $(node -e 'console.log(require("./dist/index.json").count)')"
            echo "- example: \`$S3_ENDPOINT/$S3_BUCKET/en/cloudflare.json\`"
          } >> "$GITHUB_STEP_SUMMARY"
